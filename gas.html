<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>COMPASS Gas Prices</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet"/>
  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #1a1a2e; }
    #map { position: absolute; top: 0; bottom: 0; width: 100%; }

    #header {
      position: absolute;
      top: 16px; left: 16px;
      background: rgba(26,26,46,0.92);
      color: white;
      border-radius: 8px;
      padding: 10px 16px;
      z-index: 1;
      font-size: 13px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    #header strong { color: #B6470B; font-size: 15px; }

    #legend {
      position: absolute;
      top: 16px; right: 16px;
      background: rgba(255,255,255,0.95);
      border-radius: 8px;
      padding: 14px 18px;
      font-size: 13px;
      z-index: 1;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      min-width: 200px;
    }
    #legend h3 {
      margin: 0 0 10px 0;
      font-size: 14px;
      color: #1a1a2e;
      border-bottom: 2px solid #B6470B;
      padding-bottom: 6px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      margin: 6px 0;
      color: #333;
    }
    .legend-dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      margin-right: 8px;
      flex-shrink: 0;
      border: 2px solid rgba(0,0,0,0.2);
    }
    .legend-pill {
      width: 28px; height: 14px;
      border-radius: 4px;
      margin-right: 8px;
      flex-shrink: 0;
      border: 2px solid rgba(0,0,0,0.2);
    }

    #loading {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(26,26,46,0.95);
      border-radius: 12px;
      padding: 28px 36px;
      text-align: center;
      z-index: 20;
      color: white;
    }
    #loading p { color: #94a3b8; font-size: 13px; margin-top: 10px; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #334155;
      border-top-color: #16a34a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="header">
  <strong>COMPASS Gas Prices</strong><br/>
  <span id="subtitle">Searching nearby stations...</span>
</div>

<div id="map"></div>

<div id="legend">
  <h3>Map Legend</h3>
  <div class="legend-item">
    <div class="legend-dot" style="background:#B6470B;"></div> Job Site
  </div>
  <div class="legend-item">
    <div class="legend-pill" style="background:#16a34a;"></div> Station — price available
  </div>
  <div class="legend-item">
    <div class="legend-pill" style="background:#64748b;"></div> Station — no price data
  </div>
</div>

<div id="loading">
  <div class="spinner"></div>
  <p>Fetching gas prices...</p>
</div>

<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<script>
  // ── CONFIG ───────────────────────────────────────────────
  mapboxgl.accessToken = 'pk.eyJ1IjoicGF0ZG93ZGpyIiwiYSI6ImNtb2FobHU4czA2bjcycHB5dnhqajE4aTEifQ.DXxMU7g3t74zQsn0FRlsug';
  const GOOGLE_API_KEY  = 'AIzaSyCbvMDYLl0PjQJNZTAk7MdYsAlUc9evreY';
  const SEARCH_RADIUS   = 8047;
  const MAX_RESULTS     = 10;

  // ── PARSE URL PARAMS ─────────────────────────────────────
  const p = new URLSearchParams(window.location.search);
  let jobs = [];
  try { jobs = JSON.parse(decodeURIComponent(p.get('jobs') || '[]')); } catch(e) {}

  // ── STATE ────────────────────────────────────────────────
  let allStations = [];
  let stationMarkers = [];

  // ── HELPERS ──────────────────────────────────────────────
  function formatPrice(money) {
    if (!money) return null;
    const val = parseInt(money.units || 0, 10) + (money.nanos || 0) / 1e9;
    return val > 0 ? '$' + val.toFixed(2) : null;
  }

  function getPinPrice(station) {
    const priority = ['REGULAR_UNLEADED', 'MIDGRADE', 'PREMIUM', 'DIESEL'];
    for (const type of priority) {
      const fp = (station.fuelOptions?.fuelPrices || []).find(p => p.type === type);
      const price = formatPrice(fp?.price);
      if (price) return price;
    }
    return null;
  }

  function getUpdateLabel(fuelPrices) {
    if (!fuelPrices?.length) return null;
    const times = fuelPrices.map(fp => fp.updateTime).filter(Boolean).map(t => new Date(t));
    if (!times.length) return null;
    const hrs = Math.round((Date.now() - Math.max(...times)) / 3600000);
    if (hrs < 1) return 'just now';
    if (hrs < 24) return `${hrs}h ago`;
    return `${Math.round(hrs / 24)}d ago`;
  }

  function buildPriceRows(station) {
    const types = [
      { key: 'REGULAR_UNLEADED', label: 'Regular' },
      { key: 'MIDGRADE',         label: 'Midgrade' },
      { key: 'PREMIUM',          label: 'Premium' },
      { key: 'DIESEL',           label: 'Diesel' }
    ];
    return types.map(t => {
      const fp = (station.fuelOptions?.fuelPrices || []).find(x => x.type === t.key);
      const price = formatPrice(fp?.price);
      if (!price) return '';
      return `<div style="display:flex;justify-content:space-between;gap:20px;margin-top:4px;">
        <span style="color:#555;font-size:12px;">${t.label}</span>
        <span style="font-weight:600;font-size:12px;">${price}</span>
      </div>`;
    }).join('');
  }

  // ── MARKERS ──────────────────────────────────────────────
  function createJobMarker(job, index) {
    const el = document.createElement('div');
    el.style.cssText = `
      width:32px; height:32px; border-radius:50%;
      background:#B6470B; border:3px solid white;
      box-shadow:0 2px 6px rgba(0,0,0,0.4);
      display:flex; align-items:center; justify-content:center;
      color:white; font-weight:bold; font-size:13px; cursor:pointer;
    `;
    el.textContent = index + 1;

    const popup = new mapboxgl.Popup({ offset: 20 }).setHTML(`
      <div style="font-family:'Segoe UI',sans-serif;min-width:180px;">
        <div style="font-weight:bold;color:#B6470B;font-size:14px;
                    border-bottom:1px solid #eee;padding-bottom:6px;margin-bottom:8px;">
          Job ${index + 1}
        </div>
        <div><strong>${job.name || 'Unnamed Job'}</strong></div>
        <div style="color:#555;margin-top:4px;">${job.date || ''}</div>
        <div style="color:#555;">${job.city || ''}, ${job.state || ''}</div>
      </div>
    `);

    return new mapboxgl.Marker(el).setLngLat([job.lon, job.lat]).setPopup(popup);
  }

  function createStationMarker(station) {
    const pinPrice = getPinPrice(station);
    const hasPrice = !!pinPrice;
    const bg = hasPrice ? '#16a34a' : '#64748b';

    const el = document.createElement('div');
    el.style.cssText = `
      background:${bg}; border:2px solid white; border-radius:6px;
      padding:3px 8px; color:white; font-size:11px; font-weight:700;
      box-shadow:0 2px 6px rgba(0,0,0,0.4); cursor:pointer; white-space:nowrap;
    `;
    el.textContent = pinPrice || (station.displayName?.text?.split(' ')[0] || 'Station');

    const name    = station.displayName?.text || 'Gas Station';
    const address = station.formattedAddress || '';
    const rows    = buildPriceRows(station);
    const updated = getUpdateLabel(station.fuelOptions?.fuelPrices);

    const popup = new mapboxgl.Popup({ offset: 14 }).setHTML(`
      <div style="font-family:'Segoe UI',sans-serif;min-width:180px;">
        <div style="font-weight:bold;color:#16a34a;font-size:14px;
                    border-bottom:1px solid #eee;padding-bottom:6px;margin-bottom:8px;">
          ${name}
        </div>
        <div style="color:#555;font-size:12px;margin-bottom:6px;">${address}</div>
        ${rows || '<div style="color:#94a3b8;font-size:12px;">No price data available</div>'}
        ${updated ? `<div style="color:#aaa;font-size:10px;margin-top:8px;">Updated ${updated}</div>` : ''}
      </div>
    `);

    return new mapboxgl.Marker(el)
      .setLngLat([station.location.longitude, station.location.latitude])
      .setPopup(popup);
  }

  // ── GOOGLE PLACES API ────────────────────────────────────
  async function fetchStations(lat, lon) {
    const res = await fetch('https://places.googleapis.com/v1/places:searchNearby', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Goog-Api-Key': GOOGLE_API_KEY,
        'X-Goog-FieldMask': 'places.id,places.displayName,places.location,places.formattedAddress,places.fuelOptions'
      },
      body: JSON.stringify({
        includedTypes: ['gas_station'],
        maxResultCount: MAX_RESULTS,
        locationRestriction: {
          circle: { center: { latitude: lat, longitude: lon }, radius: SEARCH_RADIUS }
        }
      })
    });
    const data = await res.json();
    return data.places || [];
  }

  // ── PLOT ─────────────────────────────────────────────────
  function plotStations() {
    stationMarkers.forEach(m => m.remove());
    stationMarkers = [];
    allStations.forEach(s => {
      if (!s.location) return;
      const m = createStationMarker(s);
      m.addTo(map);
      stationMarkers.push(m);
    });
  }

  // ── MAIN ─────────────────────────────────────────────────
  const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/outdoors-v12',
    center: [-98.5795, 39.8283],
    zoom: 4
  });
  map.addControl(new mapboxgl.NavigationControl(), 'bottom-right');

  map.on('load', async () => {
    if (!jobs.length) {
      document.getElementById('loading').innerHTML =
        '<p style="color:#f87171;">No job locations provided.</p>';
      return;
    }

    const bounds = new mapboxgl.LngLatBounds();
    jobs.forEach((job, i) => {
      createJobMarker(job, i).addTo(map);
      bounds.extend([job.lon, job.lat]);
    });

    const uniqueJobs = jobs.filter((j, i, arr) =>
      arr.findIndex(x => Math.abs(x.lat - j.lat) < 0.01 && Math.abs(x.lon - j.lon) < 0.01) === i
    );

    const results = await Promise.all(uniqueJobs.map(j => fetchStations(j.lat, j.lon)));

    const seen = new Set();
    allStations = results.flat().filter(s => {
      if (!s.id || seen.has(s.id)) return false;
      seen.add(s.id); return true;
    });

    plotStations();

    allStations.forEach(s => {
      if (s.location) bounds.extend([s.location.longitude, s.location.latitude]);
    });
    map.fitBounds(bounds, { padding: 80, maxZoom: 12 });

    document.getElementById('subtitle').textContent =
      `${allStations.length} stations near ${jobs.length} job site${jobs.length !== 1 ? 's' : ''}`;

    document.getElementById('loading').style.display = 'none';
  });
</script>
</body>
</html>
