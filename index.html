<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>COMPASS Field Map</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet"/>
  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #1a1a2e; }
    #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    #legend {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(255,255,255,0.95);
      border-radius: 8px;
      padding: 14px 18px;
      font-size: 13px;
      z-index: 1;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      min-width: 180px;
    }
    #legend h3 {
      margin: 0 0 10px 0;
      font-size: 14px;
      color: #1a1a2e;
      border-bottom: 2px solid #B6470B;
      padding-bottom: 6px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      margin: 6px 0;
      color: #333;
    }
    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      margin-right: 8px;
      flex-shrink: 0;
      border: 2px solid rgba(0,0,0,0.2);
    }
    #header {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(26,26,46,0.92);
      color: white;
      border-radius: 8px;
      padding: 10px 16px;
      z-index: 1;
      font-size: 13px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    #header strong { color: #B6470B; font-size: 15px; }
  </style>
</head>
<body>
<div id="header">
  <strong>COMPASS Field Map</strong><br/>
  <span id="header-range">Loading deployment...</span>
</div>
<div id="map"></div>
<div id="legend">
  <h3>Map Legend</h3>
  <div class="legend-item">
    <div class="legend-dot" style="background:#B6470B;"></div> Scheduled Job
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#2563eb;"></div> Recommended Hotel
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#16a34a;"></div> Outlier / Day-1 Site
  </div>
</div>

<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<script>
  // ── CONFIG ──────────────────────────────────────────────
  mapboxgl.accessToken = 'sk.eyJ1IjoicGF0ZG93ZGpyIiwiYSI6ImNtb2FoNzZxYjA3OHAyb29tcDBuMTZnb2UifQ.OTLHwoHqX1tOFezDJ-wy2g';

  // ── PARSE URL PARAMETERS ─────────────────────────────────
  function getParams() {
    const p = new URLSearchParams(window.location.search);
    let jobs = [];
    try { jobs = JSON.parse(decodeURIComponent(p.get('jobs') || '[]')); } catch(e) {}
    let hotel = null;
    try { hotel = JSON.parse(decodeURIComponent(p.get('hotel') || 'null')); } catch(e) {}
    return { jobs, hotel, label: p.get('label') || 'Deployment' };
  }

  const { jobs, hotel, label } = getParams();

  // ── SET HEADER ───────────────────────────────────────────
  document.getElementById('header-range').textContent = label;

  // ── INITIALIZE MAP ───────────────────────────────────────
  const allCoords = jobs.map(j => [j.lon, j.lat]);
  if (hotel) allCoords.push([hotel.lon, hotel.lat]);

  const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/outdoors-v12',
    center: allCoords.length
      ? allCoords.reduce((a,c) => [a[0]+c[0], a[1]+c[1]], [0,0])
               .map((v,_,arr) => v / allCoords.length)
      : [-98.5795, 39.8283],
    zoom: 6
  });

  map.addControl(new mapboxgl.NavigationControl(), 'bottom-right');

  map.on('load', () => {

    // ── FIT MAP TO ALL POINTS ──────────────────────────────
    if (allCoords.length > 0) {
      const bounds = allCoords.reduce(
        (b, c) => b.extend(c),
        new mapboxgl.LngLatBounds(allCoords[0], allCoords[0])
      );
      map.fitBounds(bounds, { padding: 80, maxZoom: 10 });
    }

    // ── DRAW ROUTE LINE BETWEEN JOBS ───────────────────────
    if (jobs.length > 1) {
      map.addSource('route', {
        type: 'geojson',
        data: {
          type: 'Feature',
          geometry: {
            type: 'LineString',
            coordinates: jobs.map(j => [j.lon, j.lat])
          }
        }
      });
      map.addLayer({
        id: 'route-line',
        type: 'line',
        source: 'route',
        layout: { 'line-join': 'round', 'line-cap': 'round' },
        paint: {
          'line-color': '#B6470B',
          'line-width': 2.5,
          'line-dasharray': [2, 2]
        }
      });
    }

    // ── PLOT JOB MARKERS ───────────────────────────────────
    jobs.forEach((job, i) => {
      const el = document.createElement('div');
      el.style.cssText = `
        width:32px; height:32px; border-radius:50%;
        background:${job.outlier ? '#16a34a' : '#B6470B'};
        border:3px solid white;
        box-shadow:0 2px 6px rgba(0,0,0,0.4);
        display:flex; align-items:center; justify-content:center;
        color:white; font-weight:bold; font-size:13px; cursor:pointer;
      `;
      el.textContent = i + 1;

      new mapboxgl.Marker(el)
        .setLngLat([job.lon, job.lat])
        .setPopup(new mapboxgl.Popup({ offset: 20 }).setHTML(`
          <div style="font-family:'Segoe UI',sans-serif;min-width:180px">
            <div style="font-weight:bold;color:#B6470B;font-size:14px;
                        border-bottom:1px solid #eee;padding-bottom:6px;
                        margin-bottom:8px">
              Job ${i + 1}${job.outlier ? ' — Outlier' : ''}
            </div>
            <div><strong>${job.name || 'Unnamed Job'}</strong></div>
            <div style="color:#555;margin-top:4px">${job.date || ''}</div>
            <div style="color:#555">${job.city || ''}, ${job.state || ''}</div>
            ${job.time ? `<div style="color:#555">Start: ${job.time}</div>` : ''}
          </div>
        `))
        .addTo(map);
    });

    // ── PLOT HOTEL MARKER ──────────────────────────────────
    if (hotel) {
      const el = document.createElement('div');
      el.style.cssText = `
        width:36px; height:36px; border-radius:8px;
        background:#2563eb;
        border:3px solid white;
        box-shadow:0 2px 6px rgba(0,0,0,0.4);
        display:flex; align-items:center; justify-content:center;
        font-size:18px; cursor:pointer;
      `;
      el.textContent = '🏨';

      new mapboxgl.Marker(el)
        .setLngLat([hotel.lon, hotel.lat])
        .setPopup(new mapboxgl.Popup({ offset: 20 }).setHTML(`
          <div style="font-family:'Segoe UI',sans-serif;min-width:180px">
            <div style="font-weight:bold;color:#2563eb;font-size:14px;
                        border-bottom:1px solid #eee;padding-bottom:6px;
                        margin-bottom:8px">
              Recommended Basecamp
            </div>
            <div><strong>${hotel.name || 'Hotel Area'}</strong></div>
            <div style="color:#555;margin-top:4px">${hotel.city || ''}, ${hotel.state || ''}</div>
            ${hotel.reason ? `<div style="color:#555;margin-top:6px;font-style:italic">${hotel.reason}</div>` : ''}
          </div>
        `))
        .addTo(map);

      // Draw lines from hotel to each job
      jobs.forEach(job => {
        map.addSource(`hotel-line-${job.name}`, {
          type: 'geojson',
          data: {
            type: 'Feature',
            geometry: {
              type: 'LineString',
              coordinates: [[hotel.lon, hotel.lat], [job.lon, job.lat]]
            }
          }
        });
        map.addLayer({
          id: `hotel-route-${job.name}`,
          type: 'line',
          source: `hotel-line-${job.name}`,
          paint: {
            'line-color': '#2563eb',
            'line-width': 1.5,
            'line-dasharray': [3, 3],
            'line-opacity': 0.5
          }
        });
      });
    }
  });
</script>
</body>
</html>
